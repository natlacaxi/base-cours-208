<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Site Désactivé</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f5f5f0;
      font-family: Georgia, serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #222;
    }

    .card {
      text-align: center;
      padding: 60px 50px 40px;
      max-width: 420px;
    }

    .icon {
      font-size: 48px;
      margin-bottom: 24px;
    }

    h1 {
      font-size: 22px;
      font-weight: normal;
      letter-spacing: 1px;
      color: #111;
      margin-bottom: 6px;
    }

    .site-desactive {
      font-size: 13px;
      color: #e33;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    p {
      font-size: 14px;
      color: #888;
      margin-bottom: 40px;
      line-height: 1.6;
    }

    .btn-force {
      background: none;
      border: none;
      font-size: 11px;
      color: #bbb;
      cursor: pointer;
      letter-spacing: 1px;
      text-decoration: underline;
      text-underline-offset: 3px;
      padding: 4px 8px;
      transition: color 0.2s;
    }
    .btn-force:hover { color: #666; }

    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .overlay.active { display: flex; }

    .digicode {
      background: #fff;
      border-radius: 12px;
      padding: 32px 28px 24px;
      width: 280px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      text-align: center;
      animation: pop 0.2s ease;
    }
    @keyframes pop {
      from { transform: scale(0.9); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .digicode h2 {
      font-size: 13px;
      font-weight: normal;
      color: #999;
      letter-spacing: 1px;
      margin-bottom: 20px;
    }

    .dots {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 24px;
    }
    .dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      border: 2px solid #ddd;
      background: transparent;
      transition: all 0.15s;
    }
    .dot.filled  { background: #222; border-color: #222; }
    .dot.error   { background: #e55; border-color: #e55; }
    .dot.success { background: #4c9; border-color: #4c9; }

    .keypad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }
    .key {
      background: #f7f7f7;
      border: 1px solid #eee;
      border-radius: 8px;
      font-size: 17px;
      font-family: Georgia, serif;
      color: #222;
      padding: 14px;
      cursor: pointer;
      transition: background 0.1s;
      user-select: none;
    }
    .key:hover  { background: #eee; }
    .key:active { background: #ddd; }
    .key.small  { font-size: 12px; color: #aaa; }
    .key-zero   { grid-column: 2; }

    .msg-error {
      font-size: 11px;
      color: #e55;
      height: 16px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .msg-error.show { opacity: 1; }

    .btn-close {
      margin-top: 14px;
      background: none;
      border: none;
      font-size: 12px;
      color: #bbb;
      cursor: pointer;
      text-decoration: underline;
    }
    .btn-close:hover { color: #888; }
  </style>
</head>
<body>

<div class="card">
  <div class="icon">🎓</div>
  <h1>Fin de l'année scolaire</h1>
  <div class="site-desactive">Site désactivé</div>
  <p>Ce site n'est plus accessible<br>jusqu'à la prochaine rentrée.</p>
  <button class="btn-force" onclick="openDigicode()">forcer</button>
</div>

<div class="overlay" id="overlay">
  <div class="digicode">
    <h2>Code d'accès</h2>
    <div class="dots" id="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
    <div class="keypad">
      <button class="key" onclick="pressKey('1')">1</button>
      <button class="key" onclick="pressKey('2')">2</button>
      <button class="key" onclick="pressKey('3')">3</button>
      <button class="key" onclick="pressKey('4')">4</button>
      <button class="key" onclick="pressKey('5')">5</button>
      <button class="key" onclick="pressKey('6')">6</button>
      <button class="key" onclick="pressKey('7')">7</button>
      <button class="key" onclick="pressKey('8')">8</button>
      <button class="key" onclick="pressKey('9')">9</button>
      <button class="key small" onclick="deleteKey()">⌫</button>
      <button class="key key-zero" onclick="pressKey('0')">0</button>
      <button class="key small" onclick="clearCode()">C</button>
    </div>
    <div class="msg-error" id="msgError">Code incorrect</div>
    <button class="btn-close" onclick="closeDigicode()">annuler</button>
  </div>
</div>

<script>
  const CORRECT = '1710';
  let current = '';

  function updateDots() {
    document.querySelectorAll('.dot').forEach((d, i) => {
      d.className = 'dot' + (i < current.length ? ' filled' : '');
    });
  }

  function pressKey(k) {
    if (current.length >= 4) return;
    current += k;
    updateDots();
    document.getElementById('msgError').classList.remove('show');
    if (current.length === 4) setTimeout(validate, 200);
  }

  function deleteKey() {
    current = current.slice(0, -1);
    updateDots();
  }

  function clearCode() {
    current = '';
    updateDots();
    document.getElementById('msgError').classList.remove('show');
  }

  function validate() {
    if (current === CORRECT) {
      document.querySelectorAll('.dot').forEach(d => d.className = 'dot success');
      setTimeout(() => window.location.href = 'https://natlacaxi.github.io/base-cours-208-2025-2026', 500);
    } else {
      document.querySelectorAll('.dot').forEach(d => d.className = 'dot error');
      document.getElementById('msgError').classList.add('show');
      setTimeout(() => { current = ''; updateDots(); }, 600);
    }
  }

  function openDigicode() {
    current = '';
    updateDots();
    document.getElementById('msgError').classList.remove('show');
    document.getElementById('overlay').classList.add('active');
  }

  function closeDigicode() {
    document.getElementById('overlay').classList.remove('active');
  }

  document.addEventListener('keydown', e => {
    if (!document.getElementById('overlay').classList.contains('active')) return;
    if (e.key >= '0' && e.key <= '9') pressKey(e.key);
    if (e.key === 'Backspace') deleteKey();
    if (e.key === 'Escape') closeDigicode();
  });
</script>
</body>
</html>
